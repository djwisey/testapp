workflows:
  ios-release:
    name: iOS Release (Flutter)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter clean and dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Verify iOS scheme exists
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace -list

      - name: Build iOS app (no codesign)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/archive/*.xcarchive

  ios-ipa-signed:
    name: iOS IPA Signed (Flutter)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.newTestApp

    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get

      - name: Build signed IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
