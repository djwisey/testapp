# Codemagic YAML v1 configuration for Flutter iOS release builds.
# IMPORTANT: Set the required App Store Connect environment variables in Codemagic UI:
# - APP_STORE_CONNECT_KEY_IDENTIFIER
# - APP_STORE_CONNECT_ISSUER_ID
# - APP_STORE_CONNECT_PRIVATE_KEY
# - CERTIFICATE_PRIVATE_KEY

workflows:
  ios-release:
    name: iOS Release (Flutter)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing
      vars:
        # App Store Connect API Key ID provided by user.
        APP_STORE_CONNECT_KEY_IDENTIFIER: D56SUPARZ5
        # App Store Connect API Issuer ID provided by user.
        APP_STORE_CONNECT_ISSUER_ID: 15da2923-51a7-4906-88b1-d177ed1f3940
        # Replace with your real iOS bundle identifier if this is different.
        BUNDLE_ID: com.dylanwiseman.testing

    scripts:
      - name: Flutter clean and dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Verify Runner scheme file exists
        script: |
          if [ ! -f ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme ]; then
            echo "Missing iOS scheme file at ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme"
            exit 1
          fi

      - name: Validate signing inputs and active bundle ID
        script: |
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY is missing in Codemagic environment variables"
            exit 1
          fi
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "CERTIFICATE_PRIVATE_KEY is missing in Codemagic environment variables"
            exit 1
          fi

          echo "Expected bundle ID: $BUNDLE_ID"
          echo "Runner target bundle IDs from project file:"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj | head -n 8

      - name: Configure automatic code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA with Codemagic build number
        script: |
          BUILD_NO="${PROJECT_BUILD_NUMBER:-$BUILD_NUMBER}"
          flutter build ipa --release --build-number="$BUILD_NO"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Uses App Store Connect API key values from Codemagic environment variables.
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        submit_to_app_store: false
